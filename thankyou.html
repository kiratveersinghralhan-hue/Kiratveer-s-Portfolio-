<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Kiratveer Portfolio</title>
  <style>
    :root{
      --bg:#0a0f1f;
      --text:#f6f2ea;
      --muted:#b9c0cf;
      --gold:#d5b06b;
      --line:rgba(255,255,255,.12);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(127,124,255,.18), transparent 24%),
        radial-gradient(circle at top right, rgba(213,176,107,.14), transparent 25%),
        radial-gradient(circle at bottom left, rgba(99,215,200,.16), transparent 20%),
        linear-gradient(180deg, #09101d 0%, #0d1424 45%, #0b1020 100%);
    }

    .card{
      width:100%;
      max-width:720px;
      padding:48px 32px;
      border:1px solid var(--line);
      border-radius:28px;
      text-align:center;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow:0 24px 70px rgba(0,0,0,.35);
      position:relative;
      overflow:hidden;
    }

    .card::before{
      content:"";
      position:absolute;
      width:220px;
      height:220px;
      background:radial-gradient(circle, rgba(213,176,107,.22), transparent 65%);
      top:-80px;
      right:-80px;
      pointer-events:none;
    }

    .badge{
      display:inline-block;
      padding:10px 18px;
      border:1px solid rgba(213,176,107,.25);
      border-radius:999px;
      color:var(--gold);
      font-size:.82rem;
      font-weight:700;
      letter-spacing:2px;
      text-transform:uppercase;
      margin-bottom:22px;
      background:rgba(255,255,255,.03);
    }

    h1{
      font-size:clamp(2.2rem,5vw,4rem);
      line-height:1;
      margin-bottom:16px;
      letter-spacing:-1px;
    }

    p{
      color:var(--muted);
      font-size:1.05rem;
      line-height:1.8;
      max-width:560px;
      margin:0 auto 14px;
    }

    .actions{
      display:flex;
      gap:14px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:28px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:190px;
      padding:14px 24px;
      border-radius:999px;
      font-weight:800;
      text-decoration:none;
      transition:.25s ease;
    }

    .btn-primary{
      background:linear-gradient(135deg, var(--gold), #b48943);
      color:#111;
      box-shadow:0 14px 34px rgba(213,176,107,.2);
    }

    .btn-secondary{
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.04);
      color:#fff;
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .note{
      margin-top:24px;
      font-size:.92rem;
      color:#9ea7bb;
    }

    @media (max-width:600px){
      .card{
        padding:38px 22px;
      }

      .actions{
        flex-direction:column;
      }

      .btn{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Inquiry Sent</div>

    <h1>Thank You.</h1>

    <p>Your inquiry has been submitted successfully.</p>
    <p>I’ll review your details and get back to you soon.</p>

    <div class="actions">
      <a href="index.html" class="btn btn-primary">Back to Portfolio</a>
      <a href="https://wa.me/919814800017" target="_blank" class="btn btn-secondary">Chat on WhatsApp</a>
    </div>

    <div class="note">
      I’ll personally review your request and get back to you soon.
</div>
</body>
</html>
